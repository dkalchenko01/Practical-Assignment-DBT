name: 'dance_studio'
version: '1.0.0'


profile: 'dance_studio'


model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
target-path: "target"

clean-targets:
  - "target"
  - "dbt_packages"


models:
  dance_studio:
    staging:
      +materialized: view
      +docs:
        node_color: 'silver'
    marts:
      +materialized: table
      +docs:
        node_color: 'gold'

seeds:
  dance_studio:
    +column_types:
      phone_number: varchar
      email: varchar